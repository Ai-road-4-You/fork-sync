name: Sync Forks
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no changes)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          chmod +x scripts/sync-forks.sh
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            bash scripts/sync-forks.sh --dry-run
          else
            bash scripts/sync-forks.sh
          fi

      - name: Update inventory
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          echo "Inventory update triggered after sync"
          # Future: auto-regenerate forks-inventory.md from API data
