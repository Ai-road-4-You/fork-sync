name: Sync Forks
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: bash scripts/sync-forks.sh
