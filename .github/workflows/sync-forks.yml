name: Sync Forks
on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: bash scripts/sync-forks.sh
